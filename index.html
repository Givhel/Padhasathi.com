```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Padhasathi — Coming Soon</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins', sans-serif;
      background:#07111f;
      overflow:hidden;
      color:white;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    .bg-glow{
      position:absolute;
      width:700px;
      height:700px;
      background:radial-gradient(circle, rgba(37,99,235,0.35) 0%, rgba(7,17,31,0) 70%);
      top:-200px;
      right:-200px;
      animation: pulse 5s infinite alternate;
    }

    @keyframes pulse{
      from{
        transform:scale(1);
      }
      to{
        transform:scale(1.15);
      }
    }

    .container{
      position:relative;
      z-index:2;
      text-align:center;
      width:90%;
      max-width:850px;
    }

    .tag{
      display:inline-block;
      padding:10px 18px;
      border:1px solid rgba(255,255,255,0.15);
      border-radius:50px;
      font-size:14px;
      letter-spacing:1px;
      margin-bottom:25px;
      color:#93c5fd;
      background:rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
    }

    h1{
      font-size:78px;
      font-weight:700;
      line-height:1;
      margin-bottom:20px;
      letter-spacing:-2px;
    }

    .gradient{
      background:linear-gradient(90deg,#60a5fa,#facc15);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      font-size:22px;
      line-height:1.7;
      color:#cbd5e1;
      max-width:700px;
      margin:auto;
    }

    .coming{
      margin-top:40px;
      font-size:18px;
      color:#facc15;
      letter-spacing:3px;
      text-transform:uppercase;
    }

    .line{
      width:120px;
      height:4px;
      background:linear-gradient(90deg,#60a5fa,#facc15);
      margin:25px auto;
      border-radius:20px;
    }

    .footer{
      margin-top:60px;
      color:#94a3b8;
      font-size:15px;
    }

    .footer span{
      color:white;
      font-weight:600;
    }

    .floating{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.04);
      animation: float 6s infinite ease-in-out;
    }

    .f1{
      width:120px;
      height:120px;
      left:8%;
      top:18%;
    }

    .f2{
      width:70px;
      height:70px;
      right:12%;
      bottom:15%;
      animation-delay:2s;
    }

    .f3{
      width:45px;
      height:45px;
      left:20%;
      bottom:10%;
      animation-delay:1s;
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-20px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    @media(max-width:768px){
      h1{
        font-size:52px;
      }

      .subtitle{
        font-size:18px;
      }
    }
  </style>
</head>

<body>

  <div class="bg-glow"></div>

  <div class="floating f1"></div>
  <div class="floating f2"></div>
  <div class="floating f3"></div>

  <div class="container">

    <div class="tag">
      🇳🇵 Built for Nepal’s Students
    </div>

    <h1>
      PADHA<span class="gradient">SATHI</span>
    </h1>

    <p class="subtitle">
      Something exciting is being built for students preparing for 
      <span class="gradient">Board, CEE & IOE</span> examinations.
      <br><br>
      Smarter preparation. Daily consistency. Better results.
    </p>

    <div class="line"></div>

    <div class="coming">
      Launching Soon 🚀
    </div>

    <div class="footer">
      Built with ambition in <span>Nepal</span>
    </div>

  </div>

</body>
</html>
```
